services:
  db:
    image: postgres:15
    container_name: lms_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: lms_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lms_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: lms_backend
    restart: always
    ports:
      - "5000:5000"
      - "5555:5555"
#    docker exec -it lms_backend npx prisma studio --port 5555 --browser none

    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://postgres:admin@db:5432/lms_db"
      JWT_SECRET: "supersecretkey"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "yarn prisma:migrate && yarn dev"

  frontend:
    build: ./frontend
    container_name: lms_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
volumes:
  postgres_data: